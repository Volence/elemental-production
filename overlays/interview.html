<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800;900&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent; overflow: hidden;
      width: 1920px; height: 1080px;
      font-family: 'Inter', sans-serif; color: white;
    }

    .container {
      position: relative; width: 1920px; height: 1080px;
      background: url('./ELMT_BG_1920x1080.png') no-repeat center/cover;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* Branding */
    .branding {
      position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 16px;
    }
    .branding .org-logo { width: 52px; height: 52px; object-fit: contain; }
    .branding .divider { width: 3px; height: 38px; background: rgba(255,255,255,0.2); border-radius: 2px; }
    .branding .event-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; letter-spacing: 3px;
    }

    /* Interview cam (large center) */
    .cam-area {
      position: absolute;
      left: 50%; top: 120px;
      transform: translateX(-50%);
      width: 760px; height: 520px;
      border: 2px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      background: rgba(0,0,0,0.4);
    }

    /* Accent bar under cam */
    .accent-bar {
      position: absolute;
      left: 50%; transform: translateX(-50%);
      top: 642px;
      width: 760px; height: 5px;
      background: linear-gradient(90deg, #2563eb, #06b6d4, #22c55e, #f59e0b, #ef4444, #f97316);
      border-radius: 0 0 4px 4px;
    }

    /* Player info card */
    .player-card {
      position: absolute;
      left: 50%; bottom: 120px;
      transform: translateX(-50%);
      text-align: center;
      
    }
    .player-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px; letter-spacing: 4px;
    }
    .player-detail {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      margin-top: 4px;
    }
    .player-team {
      font-size: 16px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 2px;
    }
    .player-role {
      font-size: 12px; font-weight: 600;
      padding: 3px 12px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .player-team-logo { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }

    .label-badge {
      position: absolute; left: 50%; bottom: 50px;
      transform: translateX(-50%);
      font-size: 14px; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; padding: 6px 24px;
      background: rgba(255,255,255,0.06); border-radius: 4px;
      color: rgba(255,255,255,0.3);
      
    }
  </style>
  <link rel="stylesheet" href="./animations.css">
</head>
<body>
  <div class="container" id="root" style="animation: fadeIn 0.6s ease-out both;"></div>

  <script src="./state-sync.js"></script>
  <script>
    // Loaded via state-sync.js for SSE + polling fallback
    const API = 'http://localhost:3001';
    function update(state) {
      const el = document.getElementById('root');
      const interviewee = state.interviewee || {};
      const playerName = interviewee.name || 'Player';
      const teamName = interviewee.teamName || '';
      const teamLogo = interviewee.teamLogo || '';
      const teamColor = interviewee.teamColor || '#fff';
      const role = interviewee.role || '';
      const label = interviewee.label || 'Post-Match Interview';

      const roleColors = { 'Tank': '#f59e0b', 'Damage': '#ef4444', 'Support': '#22c55e' };
      const roleColor = roleColors[role] || 'rgba(255,255,255,0.3)';

      el.innerHTML = `
        <div class="branding">
          <img class="org-logo" src="./org.png">
          <div class="divider"></div>
          <div class="event-name">${state.eventName || 'FACEIT SEASON 8'}</div>
        </div>

        <div class="cam-area"></div>
        <div class="accent-bar"></div>

        <div class="player-card">
          <div class="player-name" style="color:${teamColor}">${playerName}</div>
          <div class="player-detail">
            ${teamLogo ? `<img class="player-team-logo" src="${teamLogo}">` : ''}
            ${teamName ? `<span class="player-team" style="color:${teamColor}">${teamName}</span>` : ''}
            ${role ? `<span class="player-role" style="background:${roleColor}20;color:${roleColor}">${role}</span>` : ''}
          </div>
        </div>

        <div class="label-badge">${label}</div>
      `;
    }
    stateSync(update);
  </script>
</body>
</html>
