<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Casters Scoreboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent; overflow: hidden;
      width: 1920px; height: 1080px;
      font-family: 'Inter', 'Oswald', sans-serif; color: white;
    }


    .container {
      position: relative; width: 1920px; height: 1080px;
      background: url('./ELMT_BG_1920x1080.png') no-repeat center/cover;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Branding top-left ── */
    .branding {
      position: absolute; top: 28px; left: 36px;
      display: flex; align-items: center; gap: 16px;
    }
    .branding .org-logo { width: 56px; height: 56px; object-fit: contain; }
    .branding .divider { width: 2px; height: 42px; background: rgba(255,255,255,0.2); }
    .branding .event-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; letter-spacing: 2px; line-height: 1.1;
    }

    /* ── Main content — single centered column ── */
    .main-content {
      position: absolute; top: 100px;
      left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center;
      gap: 12px;
    }

    /* ── Caster cam area ── */
    .caster-area { display: flex; gap: 24px; }
    .caster-col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .caster-slot {
      width: 420px; height: 240px;
      border: 2px solid rgba(255,255,255,0.06);
      border-radius: 8px; background: transparent;
    }
    .caster-label {
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .caster-label .name {
      font-size: 15px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.5px; text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    /* ── Scoreboard panel ── */
    .scoreboard-panel {
      width: 1100px;
      background: rgba(8,8,18,0.85);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 18px 24px;
      animation: slideUp 0.5s 0.2s ease forwards;

    }

    /* ── Scoreboard header with map selector ── */
    .sb-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px; padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .sb-title-area { display: flex; align-items: center; gap: 12px; }
    .sb-title {
      font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
    }
    .sb-map-mode {
      font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.35);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .sb-score {
      font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px;
    }
    .map-selector { display: flex; gap: 4px; }
    .map-btn {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px; padding: 4px 10px; font-size: 10px; font-weight: 600;
      color: rgba(255,255,255,0.6); cursor: pointer; transition: all 0.2s;
    }
    .map-btn:hover { background: rgba(255,255,255,0.1); }
    .map-btn.active { background: rgba(99,102,241,0.3); border-color: #6366f1; color: white; }

    /* ── Two-team grid ── */
    .teams-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .team-block { border-radius: 6px; overflow: hidden; }

    .team-heading {
      padding: 6px 10px; font-size: 13px; font-weight: 800;
      display: flex; justify-content: space-between; align-items: center;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .team-heading .team-logo { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; margin-right: 8px; }
    .team-heading .team-info { display: flex; align-items: center; }
    .win-badge {
      background: #22c55e; color: white; font-size: 8px; font-weight: 700;
      padding: 2px 6px; border-radius: 3px; text-transform: uppercase;
    }

    .stat-header {
      display: grid; grid-template-columns: 90px repeat(6, 1fr);
      gap: 2px; padding: 3px 10px; font-size: 8px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px; color: rgba(255,255,255,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .player-row {
      display: grid; grid-template-columns: 90px repeat(6, 1fr);
      gap: 2px; padding: 4px 10px; font-size: 11px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    .player-name { font-weight: 700; display: flex; align-items: center; gap: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .role-tag {
      font-size: 7px; font-weight: 700; padding: 1px 4px; border-radius: 2px;
      text-transform: uppercase; flex-shrink: 0;
    }
    .role-tank { background: rgba(245,158,11,0.2); color: #f59e0b; }
    .role-damage { background: rgba(239,68,68,0.2); color: #ef4444; }
    .role-support { background: rgba(34,197,94,0.2); color: #22c55e; }

    .stat-val { text-align: center; font-variant-numeric: tabular-nums; color: rgba(255,255,255,0.75); }

    /* ── Comparison totals footer ── */
    .totals-compare {
      margin-top: 14px; padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .totals-compare .section-label {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 2px; color: rgba(255,255,255,0.3);
      text-align: center; margin-bottom: 8px;
    }
    .totals-row {
      display: grid; grid-template-columns: 1fr auto 1fr;
      gap: 0; align-items: center;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .totals-row:last-child { border-bottom: none; }
    .totals-val-left {
      text-align: right; padding-right: 16px;
      font-size: 14px; font-weight: 800; font-variant-numeric: tabular-nums;
    }
    .totals-val-right {
      text-align: left; padding-left: 16px;
      font-size: 14px; font-weight: 800; font-variant-numeric: tabular-nums;
    }
    .totals-label {
      text-align: center; font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: rgba(255,255,255,0.35); min-width: 80px;
    }
    .totals-val-left.higher { color: #22c55e; }
    .totals-val-right.higher { color: #22c55e; }

    /* ── Hero bans row ── */
    .bans-row {
      display: flex; align-items: center; justify-content: center; gap: 16px;
      margin-bottom: 12px; padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .bans-row .ban-label {
      font-size: 8px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: rgba(255,255,255,0.3);
    }
    .bans-row .ban-icon {
      width: 28px; height: 28px; border-radius: 6px;
      overflow: hidden; position: relative;
    }
    .bans-row .ban-icon img { width: 100%; height: 100%; object-fit: cover; }
    .bans-row .ban-x {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 900; color: white;
    }
  </style>
  <link rel="stylesheet" href="./animations.css">
</head>
<body>
  <div class="container" id="root" style="animation: fadeIn 0.6s ease-out both;"></div>

  <script src="./state-sync.js"></script>
  <script>
    // Loaded via state-sync.js for SSE + polling fallback
    const API = 'http://localhost:3001';
    let currentMap = -1;
    let heroData = [];

    const roleOrder = { 'Tank': 0, 'Damage': 1, 'Support': 2 };
    const nameOverrides = { 'DVa': 'dva', 'Lucio': 'lucio', 'Soldier 76': 'soldier-76', 'Torbjorn': 'torbjorn' };

    async function loadHeroes() {
      heroData = window.__HERO_DATA__ || await fetch(`${API}/api/heroes`).then(r => r.json()).catch(() => []);
    }
    function heroNameToKey(name) {
      if (!name) return '';
      if (nameOverrides[name]) return nameOverrides[name];
      return name.toLowerCase().replace(/\s+/g, '-').replace(/[.']/g, '');
    }
    function getHeroPortrait(key) {
      const hero = heroData.find(h => h.key === key);
      return hero ? hero.portrait : '';
    }

    function update(state) {
      const el = document.getElementById('root');
      const stats = state.playerStats;
      const t1 = state.teams?.team1;
      const t2 = state.teams?.team2;
      const t1Color = t1?.color || '#3b82f6';
      const t2Color = t2?.color || '#ef4444';

      if (!stats || stats.length === 0 || !t1?.name) {
        el.innerHTML = `
          <div class="branding">
            <img class="org-logo" src="./org.png">
            <div class="divider"></div>
            <div class="event-name">${state.eventName || 'FACEIT SEASON 8'}</div>
          </div>
          <div class="main-content">
            <div class="caster-area">
              ${(state.casterLayout ?? 2) >= 1 ? `<div class="caster-col">
                <div class="caster-slot" style="${(state.casterLayout ?? 2) === 1 ? 'width:560px;height:330px' : ''}"></div>
                <div class="caster-label"><span class="name">${state.casters?.[0]?.name || 'Caster 1'}</span></div>
              </div>` : ''}
              ${(state.casterLayout ?? 2) >= 2 ? `<div class="caster-col">
                <div class="caster-slot"></div>
                <div class="caster-label"><span class="name">${state.casters?.[1]?.name || 'Caster 2'}</span></div>
              </div>` : ''}
            </div>
            <div class="scoreboard-panel" style="opacity:1">
              <div style="padding:24px;text-align:center;color:rgba(255,255,255,0.3);font-size:14px">No stats available — load a match to see the scoreboard</div>
            </div>
          </div>`;
        return;
      }

      // Map index priority: 1) overlay button click, 2) dashboard selection, 3) latest
      const serverIdx = state.selectedMapIdx;
      let idx;
      if (currentMap >= 0) {
        idx = Math.min(currentMap, stats.length - 1);
      } else if (serverIdx != null && serverIdx >= 0) {
        idx = Math.min(serverIdx, stats.length - 1);
      } else {
        idx = stats.length - 1;
      }
      const round = stats[idx];
      if (!round || !round.teams || round.teams.length < 2) return;

      // Map selector
      const mapBtns = stats.map((r, i) => {
        const mapName = state.maps?.[i]?.name || `Map ${i + 1}`;
        return `<button class="map-btn ${i === idx ? 'active' : ''}" onclick="switchMap(${i})">${mapName}</button>`;
      }).join('');

      // Team blocks
      const teamHtml = round.teams.map((team, ti) => {
        const color = ti === 0 ? t1Color : t2Color;
        const teamData = ti === 0 ? t1 : t2;
        const sorted = [...team.players].sort((a, b) => (roleOrder[a.role] ?? 9) - (roleOrder[b.role] ?? 9));

        const rows = sorted.map(p => {
          const roleTag = `<span class="role-tag role-${p.role.toLowerCase()}">${p.role[0]}</span>`;
          return `<div class="player-row">
            <div class="player-name">${roleTag} ${p.nickname}</div>
            <div class="stat-val">${p.kdRatio.toFixed(1)}</div>
            <div class="stat-val">${p.kills}</div>
            <div class="stat-val">${p.deaths}</div>
            <div class="stat-val">${p.finalBlows}</div>
            <div class="stat-val">${p.damageDealt.toLocaleString()}</div>
            <div class="stat-val">${p.healingDone.toLocaleString()}</div>
          </div>`;
        }).join('');

        return `<div class="team-block" style="border-top:2px solid ${color}">
          <div class="team-heading" style="color:${color}">
            <div class="team-info">
              ${teamData?.logo ? `<img class="team-logo" src="${teamData.logo}">` : ''}
              ${team.name}
            </div>
            ${team.stats.teamWin ? '<span class="win-badge">WIN</span>' : ''}
          </div>
          <div class="stat-header">
            <div>Player</div><div class="stat-val">K/D</div><div class="stat-val">Elims</div>
            <div class="stat-val">Deaths</div><div class="stat-val">FB</div>
            <div class="stat-val">Dmg</div><div class="stat-val">Heal</div>
          </div>
          ${rows}
        </div>`;
      }).join('');

      // Build comparison totals
      const r1 = round.teams[0]; const r2 = round.teams[1];
      const t1Dmg = r1.players.reduce((s,p) => s+(p.damageDealt||0), 0);
      const t2Dmg = r2.players.reduce((s,p) => s+(p.damageDealt||0), 0);
      const t1Heal = r1.players.reduce((s,p) => s+(p.healingDone||0), 0);
      const t2Heal = r2.players.reduce((s,p) => s+(p.healingDone||0), 0);

      const compareRows = [
        ['Eliminations', r1.stats.totalEliminations, r2.stats.totalEliminations],
        ['Deaths', r1.stats.totalDeaths, r2.stats.totalDeaths],
        ['Final Blows', r1.stats.totalFinalBlows, r2.stats.totalFinalBlows],
        ['Damage', t1Dmg, t2Dmg],
        ['Healing', t1Heal, t2Heal],
      ];
      if (r1.stats.objectiveTime != null) compareRows.push(['Obj Time', r1.stats.objectiveTime, r2.stats.objectiveTime]);

      const compareHtml = compareRows.map(([label, v1, v2]) => {
        const isTime = label === 'Obj Time';
        const d1 = isTime ? `${v1}s` : Number(v1).toLocaleString();
        const d2 = isTime ? `${v2}s` : Number(v2).toLocaleString();
        const lowerIsBetter = label === 'Deaths';
        const h1 = lowerIsBetter ? (v1 < v2 ? 'higher' : '') : (v1 > v2 ? 'higher' : '');
        const h2 = lowerIsBetter ? (v2 < v1 ? 'higher' : '') : (v2 > v1 ? 'higher' : '');
        return `<div class="totals-row">
          <div class="totals-val-left ${h1}" style="color:${h1 ? '' : t1Color}">${d1}</div>
          <div class="totals-label">${label}</div>
          <div class="totals-val-right ${h2}" style="color:${h2 ? '' : t2Color}">${d2}</div>
        </div>`;
      }).join('');

      // Build hero bans
      const perMapBans = state.perMapBans || [];
      const mapBans = perMapBans[idx];
      let bansHtml = '';
      if (mapBans) {
        const renderBan = (ban, color) => {
          const heroName = typeof ban === 'string' ? ban : ban?.name || '';
          if (!heroName) return '';
          const key = heroNameToKey(heroName);
          const portrait = getHeroPortrait(key);
          return `<div class="ban-icon" style="border:2px solid ${color}">
            ${portrait ? `<img src="${portrait}" alt="${heroName}" title="${heroName}">` : ''}
            <div class="ban-x" style="background:rgba(0,0,0,0.4)">✕</div>
          </div>`;
        };
        const t1Bans = mapBans.team1Ban ? renderBan(mapBans.team1Ban, t1Color) : '';
        const t2Bans = mapBans.team2Ban ? renderBan(mapBans.team2Ban, t2Color) : '';
        if (t1Bans || t2Bans) {
          bansHtml = `<div class="bans-row">
            <span class="ban-label">Bans</span>
            ${t1Bans}${t2Bans}
          </div>`;
        }
      }

      el.innerHTML = `
        <div class="branding">
          <img class="org-logo" src="./org.png">
          <div class="divider"></div>
          <div class="event-name">${state.eventName || 'FACEIT SEASON 8'}</div>
        </div>

        <div class="main-content">
          <div class="caster-area">
            ${(state.casterLayout ?? 2) >= 1 ? `<div class="caster-col">
              <div class="caster-slot" style="${(state.casterLayout ?? 2) === 1 ? 'width:560px;height:330px' : ''}"></div>
              <div class="caster-label"><span class="name">${state.casters?.[0]?.name || 'Caster 1'}</span></div>
            </div>` : ''}
            ${(state.casterLayout ?? 2) >= 2 ? `<div class="caster-col">
              <div class="caster-slot"></div>
              <div class="caster-label"><span class="name">${state.casters?.[1]?.name || 'Caster 2'}</span></div>
            </div>` : ''}
          </div>

          <div class="scoreboard-panel">
            <div class="sb-header">
              <div class="sb-title-area">
                <div class="sb-title">${round.mapName || 'Match Stats'}</div>
                <div class="sb-map-mode">${round.mapMode || ''}</div>
              </div>
              <div style="display:flex;align-items:center;gap:16px">
                <div class="sb-score">
                  <span style="color:${t1Color}">${t1.score || 0}</span>
                  <span style="color:rgba(255,255,255,0.2)"> – </span>
                  <span style="color:${t2Color}">${t2.score || 0}</span>
                </div>
                <div class="map-selector">${mapBtns}</div>
              </div>
            </div>
            ${bansHtml}
            <div class="teams-grid">${teamHtml}</div>
            <div class="totals-compare">
              <div class="section-label">Team Totals</div>
              <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:0;margin-bottom:4px">
                <div style="text-align:right;padding-right:16px;font-size:11px;font-weight:800;color:${t1Color};text-transform:uppercase">${t1.name}</div>
                <div style="min-width:80px"></div>
                <div style="text-align:left;padding-left:16px;font-size:11px;font-weight:800;color:${t2Color};text-transform:uppercase">${t2.name}</div>
              </div>
              ${compareHtml}
            </div>
          </div>
        </div>
      `;
    }

    window.switchMap = function(idx) {
      currentMap = idx;
    };

    loadHeroes().then(() => stateSync(update));
  </script>
</body>
</html>
