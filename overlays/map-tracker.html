<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Map Tracker Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; width: 1920px; height: 1080px; }
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    .tracker {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      opacity: 0;
      animation: fadeUp 0.4s ease 0.2s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .map-slot {
      background: rgba(0,0,0,0.75);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 8px 16px;
      text-align: center;
      min-width: 120px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .map-slot.current {
      border-color: #f59e0b;
      box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
    }

    .map-slot.completed.team1-win {
      border-color: #3b82f6;
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
    }

    .map-slot.completed.team2-win {
      border-color: #ef4444;
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
    }

    .map-name {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: white;
    }

    .map-mode {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    .map-indicator {
      margin-top: 4px;
      font-size: 10px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
    }

    .map-indicator.current { color: #f59e0b; }
    .map-indicator.win { color: #22c55e; }
    .map-indicator.loss { color: #ef4444; }
  </style>
</head>
<body>
  <div id="tracker" class="tracker"></div>

  <script>
    const API = 'http://localhost:3001';
    const es = new EventSource(`${API}/api/events`);

    function update(state) {
      const tracker = document.getElementById('tracker');
      if (!state.maps || state.maps.length === 0) { tracker.innerHTML = ''; return; }

      tracker.innerHTML = state.maps.map(m => {
        let cls = 'map-slot';
        let indicator = '';
        if (m.status === 'current') {
          cls += ' current';
          indicator = '<div class="map-indicator current">▶ NOW</div>';
        } else if (m.status === 'completed' && m.winner) {
          cls += ` completed ${m.winner}-win`;
          const winName = m.winner === 'team1' ? state.teams.team1.name : state.teams.team2.name;
          indicator = `<div class="map-indicator win">✓ ${winName}</div>`;
        }
        return `<div class="${cls}">
          <div class="map-name">${m.name || 'TBD'}</div>
          <div class="map-mode">${m.mode || ''}</div>
          ${indicator}
        </div>`;
      }).join('');
    }

    es.addEventListener('state', e => update(JSON.parse(e.data)));
    fetch(`${API}/api/state`).then(r => r.json()).then(update);
  </script>
</body>
</html>
