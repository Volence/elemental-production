<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Starting Soon Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800;900&family=Oswald:wght@400;500;600;700&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent; overflow: hidden; width: 1920px; height: 1080px;
      font-family: 'Oswald', 'Bebas Neue', sans-serif; color: white;
    }
    .container {
      position: relative; width: 1920px; height: 1080px;
      background: url('./ELMT_BG_1920x1080.png') no-repeat center/cover;
    }

    /* Rainbow bar */
    .rainbow-bar {
      position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, #2563eb, #06b6d4, #22c55e, #f59e0b, #ef4444, #f97316);
    }

    /* Center hero section */
    .hero-center {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      text-align: center; z-index: 2;
    }
    .org-logo-hero {
      width: 160px; height: 160px; object-fit: contain;
      margin-bottom: 24px;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5));
      animation: floatLogo 3s ease-in-out infinite;
    }
    @keyframes floatLogo {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .hero-title {
      font-family: 'Bebas Neue', 'Oswald', sans-serif;
      font-size: 120px; font-weight: 400; line-height: 0.95;
      text-transform: uppercase; letter-spacing: 6px;
      text-shadow: 0 4px 40px rgba(0,0,0,0.6), 0 0 80px rgba(249,115,22,0.15);
      margin-bottom: 20px;
    }
    .hero-title span {
      display: block; font-size: 140px;
      background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* Timer - centered below title */
    .countdown-center {
      display: flex; align-items: center; justify-content: center; gap: 24px;
      margin-top: 16px;
    }
    .countdown-time {
      font-family: 'Oswald', sans-serif;
      font-size: 96px; font-weight: 700; letter-spacing: 4px; line-height: 1;
      text-shadow: 0 4px 30px rgba(0,0,0,0.5);
      color: #fff;
    }
    .countdown-label {
      padding: 10px 32px; font-size: 22px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 4px;
      background: linear-gradient(135deg, #f97316 0%, #ef4444 100%);
      color: white; border-radius: 6px;
      box-shadow: 0 4px 20px rgba(249,115,22,0.3);
    }

    /* Event title bar */
    .event-bar {
      margin-top: 32px;
      padding: 14px 48px; font-size: 20px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 4px;
      background: linear-gradient(135deg, #f97316 0%, #ef4444 100%);
      color: white; border-radius: 6px; display: inline-block;
      box-shadow: 0 4px 20px rgba(249,115,22,0.3);
    }

    /* Schedule - bottom right */
    .schedule-section {
      position: absolute; right: 60px; bottom: 60px;
      width: 520px;
    }
    .schedule-header {
      font-size: 14px; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; padding: 8px 16px; text-align: right;
      color: rgba(255,255,255,0.5); margin-bottom: 8px;
    }
    .match-row {
      display: flex; align-items: center; padding: 10px 16px; margin-bottom: 4px;
      background: rgba(15,15,25,0.85); border-radius: 4px;
      border-left: 3px solid transparent; transition: all 0.3s;
    }
    .match-row.up-next {
      border-left-color: #f97316;
      background: rgba(249,115,22,0.15);
    }
    .match-row .team-left, .match-row .team-right {
      display: flex; align-items: center; gap: 8px; flex: 1;
    }
    .match-row .team-right { justify-content: flex-end; }
    .match-row .team-logo { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
    .match-row .team-name { font-size: 16px; font-weight: 600; }
    .match-row .vs { color: rgba(255,255,255,0.3); font-size: 12px; padding: 0 8px; }
    .match-row .match-time {
      font-size: 22px; font-weight: 700; min-width: 60px; text-align: right;
    }
    .match-row .match-label {
      font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
      color: #f97316; text-align: right; display: block;
    }
    .match-row .match-info { text-align: right; min-width: 90px; }

    /* Social links - bottom left */
    .social-bar {
      position: absolute; bottom: 60px; left: 60px;
      display: flex; gap: 28px; align-items: center;
    }
    .social-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 15px; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(255,255,255,0.5);
    }
    .social-item svg { width: 18px; height: 18px; fill: rgba(255,255,255,0.4); }

    /* Subtle background decoration */
    .bg-glow {
      position: absolute; width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(249,115,22,0.06) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulseGlow 4s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    }
  </style>
  <link rel="stylesheet" href="./animations.css">
</head>
<body>
  <div class="container" id="root" style="animation: fadeIn 0.8s ease-out both;"></div>

  <script src="./state-sync.js"></script>
  <script>
    const API = 'http://localhost:3001';
    let lastBuiltKey = '';

    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }

    function buildKey(state) {
      // Only rebuild DOM when non-countdown data changes
      const schedule = state.schedule || [];
      const t1 = state.teams?.team1?.name || '';
      const t2 = state.teams?.team2?.name || '';
      const event = state.eventTitle || state.matchTitle || '';
      return `${t1}|${t2}|${event}|${schedule.length}|${schedule.map(m => m.team1 + m.team2).join(',')}`;
    }

    function update(state) {
      const el = document.getElementById('root');
      const remaining = state.countdown?.remaining || 0;

      // If the countdown element already exists, just update the text
      const timerEl = document.getElementById('countdown-timer');
      const currentKey = buildKey(state);

      if (timerEl && currentKey === lastBuiltKey) {
        timerEl.textContent = formatTime(remaining);
        return;
      }

      lastBuiltKey = currentKey;
      const schedule = state.schedule || [];
      const label = state.countdown?.label || 'STARTING SOON';

      // Build schedule rows
      const scheduleHtml = schedule.length > 0 ? schedule.map((match, i) => {
        const isNext = i === 0;
        return `<div class="match-row ${isNext ? 'up-next' : ''}">
          <div class="team-left">
            ${match.team1Logo ? `<img class="team-logo" src="${match.team1Logo}">` : '<div class="team-logo" style="background:#333;border-radius:50%"></div>'}
            <span class="team-name">${match.team1 || 'TBD'}</span>
          </div>
          <span class="vs">—</span>
          <div class="team-right">
            <span class="team-name">${match.team2 || 'TBD'}</span>
            ${match.team2Logo ? `<img class="team-logo" src="${match.team2Logo}">` : '<div class="team-logo" style="background:#333;border-radius:50%"></div>'}
          </div>
          <div class="match-info">
            <span class="match-time">${isNext ? '' : (match.time || '')}</span>
            <span class="match-label">${isNext ? 'UP NEXT' : (match.label || '')}</span>
          </div>
        </div>`;
      }).join('') : `
        <div class="match-row up-next">
          <div class="team-left">
            ${state.teams?.team1?.logo ? `<img class="team-logo" src="${state.teams.team1.logo}">` : ''}
            <span class="team-name">${state.teams?.team1?.name || 'TBD'}</span>
          </div>
          <span class="vs">—</span>
          <div class="team-right">
            <span class="team-name">${state.teams?.team2?.name || 'TBD'}</span>
            ${state.teams?.team2?.logo ? `<img class="team-logo" src="${state.teams.team2.logo}">` : ''}
          </div>
          <div class="match-info">
            <span class="match-label">UP NEXT</span>
          </div>
        </div>`;

      // Event title from state
      const eventTitle = state.eventTitle || state.matchTitle || '';

      el.innerHTML = `
        <div class="rainbow-bar"></div>
        <div class="bg-glow"></div>

        <div class="hero-center">
          <img class="org-logo-hero" src="./org.png">
          <div class="hero-title"><span>STARTING SOON</span></div>
          <div class="countdown-center">
            <div class="countdown-time" id="countdown-timer">${formatTime(remaining)}</div>
          </div>
          ${eventTitle ? `<div class="event-bar">${eventTitle}</div>` : ''}
        </div>

        <div class="schedule-section">
          <div class="schedule-header">TODAY'S SCHEDULE</div>
          ${scheduleHtml}
        </div>

        <div class="social-bar">
          <div class="social-item">
            <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814z"/></svg>
            YOUTUBE
          </div>
          <div class="social-item">
            <svg viewBox="0 0 24 24"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z"/></svg>
            TWITCH
          </div>
          <div class="social-item">
            <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
            DISCORD
          </div>
        </div>
      `;
    }
    stateSync(update);
  </script>
</body>
</html>
