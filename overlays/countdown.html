<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Countdown Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; width: 1920px; height: 1080px; }
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap');

    .countdown-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      opacity: 0;
      animation: fadeIn 0.6s ease forwards;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .countdown-label {
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }

    .countdown-time {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 120px;
      color: white;
      letter-spacing: 8px;
      text-shadow: 0 0 40px rgba(99, 102, 241, 0.4), 0 0 80px rgba(99, 102, 241, 0.15);
      line-height: 1;
    }

    .countdown-time.urgent {
      color: #ef4444;
      text-shadow: 0 0 40px rgba(239, 68, 68, 0.4), 0 0 80px rgba(239, 68, 68, 0.15);
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="countdown" class="countdown-container hidden">
    <div id="label" class="countdown-label">Starting Soon</div>
    <div id="time" class="countdown-time">05:00</div>
  </div>

  <script>
    const API = 'http://localhost:3001';
    const es = new EventSource(`${API}/api/events`);

    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
    }

    function update(state) {
      const container = document.getElementById('countdown');
      const cd = state.countdown;

      if (!cd.running && cd.remaining <= 0) {
        container.classList.add('hidden');
        return;
      }

      container.classList.remove('hidden');
      document.getElementById('label').textContent = cd.label || 'Starting Soon';
      const timeEl = document.getElementById('time');
      timeEl.textContent = formatTime(cd.remaining);
      timeEl.className = cd.remaining <= 10 ? 'countdown-time urgent' : 'countdown-time';
    }

    es.addEventListener('state', e => update(JSON.parse(e.data)));
    fetch(`${API}/api/state`).then(r => r.json()).then(update);
  </script>
</body>
</html>
