<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; width: 1920px; height: 1080px; }
    .name {
      position: absolute;
      top: 900px;
      color: white;
      font-weight: 700;
      font-size: 48px;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      white-space: nowrap;
      text-align: center;
    }
    .name.c1 {
      /* Centered under caster 1 webcam area (x: 338, w: 640) */
      left: 338px;
      width: 640px;
    }
    .name.c2 {
      /* Centered under caster 2 webcam area (x: 1116, w: 640) */
      left: 1116px;
      width: 640px;
    }
  </style>
</head>
<body>
  <div id="c1" class="name c1">Caster 1</div>
  <div id="c2" class="name c2">Caster 2</div>

  <script>
    const API = 'http://localhost:3001';
    const es = new EventSource(`${API}/api/events`);
    let fontLink = null;

    function loadFont(fontFamily, fontUrl) {
      if (fontLink) fontLink.remove();
      if (fontUrl) {
        fontLink = document.createElement('link');
        fontLink.rel = 'stylesheet';
        fontLink.href = fontUrl;
        document.head.appendChild(fontLink);
      }
      document.querySelectorAll('.name').forEach(el => {
        el.style.fontFamily = `'${fontFamily}', sans-serif`;
      });
    }

    function update(state) {
      const c1 = state.casters?.[0] || {};
      const c2 = state.casters?.[1] || {};
      document.getElementById('c1').textContent = c1.name || 'Caster 1';
      document.getElementById('c2').textContent = c2.name || 'Caster 2';

      // Load font from state
      if (state.font) {
        loadFont(state.font.family || 'Inter', state.font.url || '');
      }
    }

    es.addEventListener('state', e => update(JSON.parse(e.data)));
    fetch(`${API}/api/state`).then(r => r.json()).then(update);
  </script>
</body>
</html>
